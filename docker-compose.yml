services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: catequesis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-catequesis}
      POSTGRES_DB: catequesis
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catequesis"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://catequesis:${DB_PASSWORD:-catequesis}@db:5432/catequesis
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-en-produccion}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  db_data:
  uploads_data:
